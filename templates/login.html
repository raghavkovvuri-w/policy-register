<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Policy Register</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1B1F3B 0%, #2A2F52 50%, #43B9AC 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
.login-card { background: white; border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-header { text-align: center; margin-bottom: 32px; }
.login-header h1 { font-size: 1.5rem; color: #1B1F3B; margin-bottom: 4px; }
.login-header p { color: #6c757d; font-size: 0.85rem; }
.logos { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
.logos img { height: 40px; object-fit: contain; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #495057; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; }
.form-group input:focus { outline: none; border-color: #2E86AB; }
.btn-login { width: 100%; padding: 14px; background: #1B1F3B; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: inherit; }
.btn-login:hover { background: #43B9AC; }
.error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 16px; }
.footer-note { text-align: center; margin-top: 24px; font-size: 0.75rem; color: #adb5bd; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logos">
    <img src="{{ url_for('static', filename='ieg-logo.svg') }}" alt="IEG" style="height:40px;background:#1B1F3B;padding:6px 12px;border-radius:6px;" onerror="this.outerHTML='<span style=\'font-weight:700;color:#1B1F3B\'>IEG</span>'">
    <img src="{{ url_for('static', filename='ucp-logo.png') }}" alt="UCP" style="height:40px;background:#1B1F3B;padding:6px 12px;border-radius:6px;" onerror="this.outerHTML='<span style=\'font-weight:700;color:#43B9AC\'>UCP</span>'">
  </div>
  <div class="login-header">
    <h1>Policy Register</h1>
    <p>Inspire Education Group</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  <p class="footer-note">Inspire Education Group</p>
</div>
</body>
</html>
